<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页</title>
    <style>
        /* 全局样式 */
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --accent-color: #e74c3c;
            --text-color: #2c3e50;
            --light-color: #ecf0f1;
            --dark-color: #34495e;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        
        /* 装饰元素 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            opacity: var(--opacity);
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); }
            50% { opacity: 0.2; }
        }
        
        /* 标题样式 */
        h1 {
            font-size: 42px;
            margin-bottom: 30px;
            color: var(--dark-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            position: relative;
            display: inline-block;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }
        
        /* 按钮样式 */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        button {
            background: linear-gradient(145deg, var(--primary-color), #2182bd);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(255,255,255,0.2), transparent);
            transform: translateZ(-5px) rotateX(90deg);
            transition: transform 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }
        
        button:hover::before {
            transform: translateZ(-5px) rotateX(0deg);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        /* 链接样式 */
        .info-container {
            margin-bottom: 40px;
        }
        
        .info-container p {
            font-size: 18px;
            margin: 10px 0;
            color: var(--dark-color);
        }
        
        .info-container .tag {
            display: inline-block;
            background-color: var(--light-color);
            color: var(--text-color);
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 14px;
            margin-left: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* 底部版权信息 */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: var(--dark-color);
            opacity: 0.7;
        }
        
        /* 主内容区域 */
        .main-content {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 800px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .button-container {
                flex-direction: column;
                gap: 15px;
            }
            
            button {
                width: 100%;
            }
            
            h1 {
                font-size: 32px;
            }
        }
        
        /* 特殊效果 */
        .magic-sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }
        
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: sparkle 1s ease-out forwards;
        }
        
        @keyframes sparkle {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="stars" id="stars"></div>
    
    <div class="main-content">
        <h1>✨ 神奇の传送门 ✨</h1>
        <div class="button-container">
            <button onclick="window.location.href='p1.html'">NSFW</button>
            <button onclick="window.location.href='p2.html'">SFW</button>
            <button onclick="window.location.href='p3.html'">赌徒</button>
        </div>
    </div>
    
    <div class="info-container">
        <p>NSFW <span class="tag">R18内容</span></p>
        <p>SFW <span class="tag">非R18内容</span></p>
        <p>赌徒 <span class="tag">50%概率R18</span></p>
    </div>
    
    <div class="footer">
        <p>&copy; 2025 我的网站. All rights reserved.</p>
    </div>

    <script>
        // 创建星星背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starsCount = 50;
            
            for (let i = 0; i < starsCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // 随机位置
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                
                // 随机大小
                const size = Math.random() * 3 + 1;
                
                // 随机动画延迟和持续时间
                const duration = Math.random() * 3 + 2;
                const opacity = Math.random() * 0.5 + 0.5;
                
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.setProperty('--duration', `${duration}s`);
                star.style.setProperty('--opacity', opacity);
                
                starsContainer.appendChild(star);
            }
        }
        
        // 创建点击特效
        function createSparkle(x, y) {
            const sparkleContainer = document.createElement('div');
            sparkleContainer.classList.add('magic-sparkle');
            document.body.appendChild(sparkleContainer);
            
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                
                // 随机位置偏移
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;
                
                sparkle.style.left = `${x + offsetX}px`;
                sparkle.style.top = `${y + offsetY}px`;
                
                sparkleContainer.appendChild(sparkle);
            }
            
            // 1秒后移除特效
            setTimeout(() => {
                document.body.removeChild(sparkleContainer);
            }, 1000);
        }
        
        // 按钮点击效果
        const buttons = document.querySelectorAll('button');
        buttons.forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                createSparkle(
                    rect.left + rect.width / 2,
                    rect.top + rect.height / 2
                );
            });
        });
        
        // 页面加载时创建星星
        window.addEventListener('DOMContentLoaded', createStars);
    </script>
</body>
</html>
