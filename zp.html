<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机轮盘</title>
    <link rel="stylesheet" href="css/zp.css">
</head>
<body>
    <!-- 页面标题 -->
    <h1>✨ 随机轮盘 ✨</h1>

    <!-- 轮盘容器 -->
    <div class="wheel-container">
        <div class="wheel" id="wheel"></div>
        <button id="spin-button">旋转轮盘</button>
    </div>

    <script>
        // 定义轮盘选项和对应的页面
        const options = [
            { name: 'NSFW', url: 'NSFW.html' },
            { name: 'SFW', url: 'SFW.html' },
            { name: '赌徒', url: 'HSFW.html' },
            { name: 'Hina', url: 'p4.html' }
        ];

        // 获取轮盘和按钮元素
        const wheel = document.getElementById('wheel');
        const spinButton = document.getElementById('spin-button');

        // 旋转轮盘的函数
        function spinWheel() {
            // 禁用按钮，防止多次点击
            spinButton.disabled = true;

            // 随机选择一个选项
            const randomIndex = Math.floor(Math.random() * options.length);
            const selectedOption = options[randomIndex];

            // 计算旋转角度
            const angle = (360 / options.length) * randomIndex;

            // 添加旋转动画
            wheel.style.transition = 'transform 2.75s ease-out';
            wheel.style.transform = `rotate(${angle + 360 * 5}deg)`; // 旋转多圈后停止

            // 动画结束后跳转到对应的页面
            setTimeout(() => {
                window.location.href = selectedOption.url;
            }, 2750); // 等待动画完成

            // 在动画结束后重新启用按钮
            setTimeout(() => {
                spinButton.disabled = false;
            }, 2750);
        }

        // 添加按钮点击事件
        spinButton.addEventListener('click', spinWheel);
    </script>
</body>
</html>
