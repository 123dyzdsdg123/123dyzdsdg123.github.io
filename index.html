<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页</title>
    <style>
        /* 全局样式 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* 标题样式 */
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* 按钮样式 */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* 链接样式 */
        a {
            text-decoration: none;
            color: #3498db;
            font-size: 16px;
            margin-top: 20px;
            display: inline-block;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 底部版权信息 */
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h1>欢迎来到我的网站</h1>
        <div class="button-container">
            <button onclick="window.location.href='p1.html'">NSFW</button>
            <button onclick="window.location.href='p2.html'">SFW</button>
            <button onclick="window.location.href='p3.html'">日奈特供</button>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2025 我的网站. All rights reserved.</p>
    </div>
</body>
</html>
